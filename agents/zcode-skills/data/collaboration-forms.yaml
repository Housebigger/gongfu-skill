# 五种协作形态
# 蒸馏自 strategy/collaboration/ 02-05

# 铁律：从松到紧逐步升级，不跳级。每一步至少合作3-6个月再升级。
escalation_rule: 从松到紧逐步升级，永远不要跳级——先互换建立信任，再互助共享资源，然后组队接大单，模式稳定了才合伙。

forms:
  技能互换:
    tightness: 最松
    core: 我帮你你帮我，不涉及钱
    fit: 起步阶段，互相补短板，建立初步信任
    risk: 极低
    upgrade_signal: 互换了几次都很靠谱 → 升级到互助小组

  互助小组:
    tightness: 松
    core: 3-8个同行/相关行业人，定期交流/共享信息/互推客户/拼单采购
    fit: 同行抱团降低成本、共享客户资源
    risk: 极低
    key_rule: 只推你验证过的人——你推的人砸了你的口碑
    upgrade_signal: 合作半年以上互相信任，业务稳定 → 升级到接包小队

  接包小队:
    tightness: 中
    core: 一个人接不了的大单/复杂项目，几个人临时组队干，干完分钱
    fit: 跨能力组合接大单
    risk: 中
    key_rules:
      - 谁是总包——有一个人对接客户，其他人对他负责
      - 分钱规则提前定——按工时/工种/贡献，一单开始前定死
      - 质量谁兜底——出了问题总包负责返工

  合伙经营:
    tightness: 紧
    core: 两人或几人共同出资、共担风险、共分利润，长期合作
    fit: 业务模式已验证，需要长期投入和共同承担
    risk: 较高（涉及法律/资金/信任）
    key_rules:
      - 股权事前定死，最忌讳50/50（遇到分歧谁也说服不了谁）
      - 必须有一个人占51%+或有最终拍板权
      - 退出机制事前写死

  合作社:
    tightness: 最紧
    core: 制度化的集体组织，有法律地位（农民专业合作社法），成员共同所有
    fit: 农业规模化/社区服务规模化
    risk: 管理复杂、决策慢
    key_rules:
      - 民主管理，一人一票
      - 按交易额分配（非按出资）
      - 享有税收优惠/补贴/贷款便利

# 合作第一天必须谈的七件事（先小人后君子）
seven_things:
  1-各自出什么: 不只算钱——出力/出资源/出技术都是投入
  2-谁拍板: 必须有一个人占51%+或最终拍板权，忌讳50/50
  3-怎么分钱: 比例+周期+留存发展基金
  4-怎么算账: 账目必须透明，任何合伙人随时可查
  5-谁干什么: 分工不重叠不真空
  6-亏了怎么办: 亏损怎么共担+止损线（最难谈但最重要）
  7-谁想走怎么办: 退出机制——主动退出/被动退出/散伙清算/竞业

# 四种跨行业协同经典组合
cross_industry_patterns:
  工厂+内容+电商:
    roles: [制造端(有产品), 内容端(会拍/写), 电商端(懂运营)]
    result: 把工厂产品直接卖向全国
  技术+服务+运营:
    roles: [技术端(有手艺), 服务端(管客户), 运营端(做推广)]
    result: 做区域服务品牌
  农业+内容+物流:
    roles: [种植端, 直播端, 冷链物流端]
    result: 农产品跳过中间商直销全国
  设计+生产+渠道:
    roles: [设计师, 工厂, 销售商]
    result: 做自有品牌产品

# 三条合规红线
red_lines:
  - id: 非法集资
    rule: 不向不特定公众吸收资金、不承诺固定回报
    judge: 如果你在向不认识的人收钱且承诺赚多少→已踩线
  - id: 传销
    rule: 收入靠卖货/服务不靠拉人头，分销最多2级
    judge: 如果收入主要来自发展下线而非卖货→是传销
  - id: 非法用工
    rule: 雇人就签合同交社保，或走劳务协议
    judge: 如果一个人固定来干活听你安排按月领钱→他是你的员工

# 组织形式选择
org_forms:
  起步阶段: 不需要注册——个人接单（注意申报个税）
  业务稳定后: 注册个体工商户（最简单成本最低）
  合伙时: 先合伙协议，后注册实体——协议比形式重要
  农业/社区: 考虑合作社（有税收优惠）
