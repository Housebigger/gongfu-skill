# 地域×机会矩阵
# 蒸馏自 strategy/regional/ 00-方法论框架（第六节总矩阵）+ 01-05
# regions: 五大区域（按劳动者视角的功能分区）
# scores: ★数量（1-5），表示该机会在该区域的确定性和可操作性

regions:
  ①三大动力源:
    scope: 京津冀/长三角/大湾区
    characteristics: 最高工资+最高成本+最强竞争
    opportunity_type: 拼技术/拼创新的天花板
    fit_for: 有硬技能想冲的年轻人
    key_cities: [北京, 上海, 深圳, 广州, 杭州, 苏州]
    pros: 机会最多、信息最快、资本最密、政策试点最早
    cons: 房价最高、竞争最烈、35岁焦虑

  ②新兴增长极:
    scope: 成渝/长江中游/中部/关中
    characteristics: 工资在涨+成本适中+产业承接
    opportunity_type: 性价比最高，进退皆可
    fit_for: 卷不动一线的/本地想留的
    key_cities: [成都, 重庆, 武汉, 长沙, 合肥, 西安, 郑州]
    pros: 承接产业转移、成本只有一线一半、消费追平一线
    cons: 产业密度不如一线、信息滞后

  ③战略腹地与西部:
    scope: 新疆/西藏/青海/甘肃/宁夏/内蒙古/云南/贵州/广西
    characteristics: 能源/资源/国防/产业备份
    opportunity_type: 底盘工程，确定但条件苦
    fit_for: 本地人/能源矿业技能者
    key_cities: [乌鲁木齐, 昆明, 贵阳, 兰州, 南宁]
    pros: 能源运维薪资高、政策投入大
    cons: 地域偏远、生活单调、信息差大

  ④东北老工业基地:
    scope: 黑吉辽+蒙东
    characteristics: 老工业底子+最重老龄化+转型中
    opportunity_type: 农业军工冰雪养老，独家禀赋
    fit_for: 本地人/重工业农业技能者
    key_cities: [哈尔滨, 长春, 沈阳, 大连]
    pros: 生活成本低、购买力不弱、独家优势（农业/军工/冰雪）
    cons: 人口流失、营商环境待提升

  ⑤县域与乡村:
    scope: 全国1800+县
    characteristics: 低成本+蓝海+需求回流
    opportunity_type: 下沉服务/农产品上行/返乡
    fit_for: 返乡的/低成本创业者
    pros: 竞争不充分、试错成本低、政策支持
    cons: 市场天花板低、人情社会、信息差

# 地域×机会评分矩阵（★=确定性×可操作性）
