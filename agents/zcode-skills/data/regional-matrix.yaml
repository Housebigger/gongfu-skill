# 区域选择决策辅助
regional_advice:
  大城市vs本地: >
    算清「机会×成本」性价比，不是「工资越高越好」。
    月薪两万在动力源的实际购买力可能不如月薪一万在新兴增长极。
  年轻人冲动力源: >
    22-32岁有硬技能的，动力源是技能变现最快、成长天花板最高的地方。
    设时间锚：35岁前冲，冲出来留下，冲不出来带技能去新兴增长极。
  回县域创业: >
    最佳策略是「动力源的见识+县域的成本」——用一线验证过的模式，在蓝海市场低成本做一遍。
    县域不需要「做大」，需要「做稳」。
