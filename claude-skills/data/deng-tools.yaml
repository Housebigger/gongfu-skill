# 邓小平理论思维工具速查
# 蒸馏自 methodology/deng_xiaoping_theory/reference/ + inspiration/
# 与毛泽东工具（怎么行动）和马克思主义工具（看清为什么）互补：
#   邓小平工具侧重"务实地干"——解放思想、发展优先、效果导向、先干再说

tools:
  发展才是硬道理:
    principle: 与其纠结对错，不如先发展——发展了，很多问题自然消失
    use_when: 用户纠结该不该转行/该不该学/该不该做——用"三个有利于"替代无限分析
    one_liner: 不要争论，先干起来——发展解决一切问题
    quote_source: 邓小平南方谈话（1992年）

  解放思想实事求是:
    principle: 思想僵化比能力不足更致命——用事实替代预设，用验证替代猜测
    use_when: 用户说"我不行/不可能/没办法"——这些大概率是预设不是事实
    one_liner: 你以为的"不行"可能只是"没试过"——实事求是地去看
    quote_source: 邓小平《解放思想，实事求是，团结一致向前看》（1978年）

  黑猫白猫:
    principle: 不看标签看效果——能解决问题的方法就是好方法
    use_when: 用户在选择"大公司还是小公司/学A还是学B/做副业还是考证"时被标签困住
    one_liner: 不管黑猫白猫，捉到老鼠就是好猫——先明确你的"老鼠"是什么
    quote_source: 邓小平讲话（1962年），后概括为"猫论"

  摸着石头过河:
    principle: 不要等"准备好了"再开始——先迈最小一步，看反馈，再调整
    use_when: 用户"准备过头但不行动"/等"完美时机"/害怕犯错不敢开始
    one_liner: 胆子大+步子稳——先做最小实验，看效果再走下一步
    quote_source: 邓小平改革方法论（1980年代）

  科学技术是第一生产力:
    principle: 技能投资的回报率最高——学一门技术就是投资"第一生产力"
    use_when: 用户在犹豫"要不要花时间/钱学技能"/低估技术工种的价值
    one_liner: 科学技术是第一生产力——你的技能就是你的生产力
    quote_source: 邓小平谈话（1988年）

  让一部分人先富起来:
    principle: 平均主义不是公平——先让自己值钱，再谈怎么帮助别人
    use_when: 用户纠结于"公不公平"/困在"大家都不好"的环境中不敢突围
    one_liner: 先富不是目的，是手段——先让自己好起来，再带动身边的人
    quote_source: 邓小平多次谈话（1985-1992年）

  稳定压倒一切:
    principle: 稳定是发展的前提——先稳住基本盘（收入/健康/家庭），再图发展
    use_when: 用户在剧变中想"一步到位"/基础不稳就想冒险
    one_liner: 先活下来再想怎么活得好——没有稳定，什么都搞不成
    quote_source: 邓小平谈话（1989年后）

  三个面向:
    principle: 学的东西要面向现代化、面向世界、面向未来——不要学正在过时的东西
    use_when: 用户在选学习方向/选行业/判断趋势时
    one_liner: 你学的东西是面向过去的、现在的、还是未来的？
    quote_source: 邓小平为景山学校题词（1983年）

# 邓小平理论与行业集群的匹配规则
