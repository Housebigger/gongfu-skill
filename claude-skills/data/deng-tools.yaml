    - 科学技术是第一生产力
    - 摸着石头过河
  B-数字与智能产业:
    - 科学技术是第一生产力
    - 黑猫白猫
  C-绿色能源全链:
    - 发展才是硬道理
    - 三个面向
  D-农业与乡村振兴:
    - 让一部分人先富起来
