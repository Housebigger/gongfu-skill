# 四种画像成长路线
# 蒸馏自 strategy/growth_path/ 00-04

# 学习地图三层结构（从下往上盖楼，不能跳级）
learning_layers:
  layer1-手艺:
    desc: 一门能直接换钱的技能
    time: 1-3年
    role: 最底层安全网——有手艺就有饭碗
  layer2-证书资质:
    desc: 手艺的社会证明
    time: 6个月-2年
    role: 有手艺+有证书=完整竞争力
  layer3-判断力经营:
    desc: 知道什么时候该出手/等待/转向
    time: 长期积累
    role: 从「会干活」到「会经营」的跨越

# 四种起点画像
profiles:
  应届毕业生:
    age: 20-25
    core_contradiction: 选择太多+经验为零=容易选错或什么都不选
    main_axis: 选一个确定性方向，扎进去3-5年
    routes:
      - name: 确定性第一
        desc: 进国家刚需的硬技能赛道（集成电路/工业母机/养老护理）
        timeline: 入行1-2年站稳，3-5年成熟手
      - name: 刚性需求第二
        desc: 进「人不来就得停摆」的服务业（养老/育婴/电工）
        timeline: 培训1-3月上岗
      - name: 增量赛道第三
        desc: 进确定在增长的新行业（储能/低空/AI应用/机器人）
        timeline: 需要学习能力，风险更高
    key_decisions:
      - 考公考编vs进企业（设两年止损线）
      - 大城市vs回老家（大城市学本领3-5年→带技能回去）
      - 先就业vs先择业（经济压力大就先就业）
    biggest_risk: 25岁前最大的风险不是选错，是什么都不选

  在岗产线工人:
    age: 28-38
    core_contradiction: 有经验但技能单一→怕被自动化/年轻人替代
    main_axis: 从纯操作升级为技术/编程/管理
    routes:
      - name: 设备维护方向（最推荐）
        desc: 用产线经验转型——从「操作机器」到「维护机器」
        steps: [考电工证(2月), 学PLC基础(6月-1年), 成为维修工程师(2-3年)]
        income: 维修工比操作工高30-50%
      - name: 数控编程方向
        desc: 从「按按钮」变成「写程序」
        steps: [学CNC操作, 学Mastercam/UG编程, 考数控资格证]
        income: CNC编程员8000-15000/月
      - name: 质量工程方向
        desc: 从「被检验的」变成「检验别人的」
        steps: [转质检岗, 学SPC/六西格玛, 考质量工程师证]
        income: 质量工程师8000-12000/月
    key_insight: 你最值钱的是10年产线积累的「机器直觉」——把它变成专业能力

  跨行转行者:
    age: 38-50
    core_contradiction: 原行业下行+年龄焦虑+怕沉没成本白费
    main_axis: 用可迁移技能+新证书打开新行业
    transferable_skills:
      - 管人带团队 → 任何行业的管理岗
      - 安全合规经验 → 新能源材料/环保/建筑安全管理
      - 设备操作维护 → 智能矿山/智能工厂设备操作
      - 客户销售经验 → 任何行业销售/运营
      - 质量工艺经验 → 制造业质量/工艺/生产管理
      - 组织协调能力 → 物流/物业/社区管理
    routes:
      - name: 留在原产业链挪到增长环节（风险最低）
        desc: 从收缩环节挪到增长环节（如煤工→矿山设备运维）
      - name: 跨行业用可迁移技能
        desc: 如安全经验→新能源材料厂安全工程师
      - name: 考刚需证书进确定性赛道
        certs: [注册安全工程师(3-6月), 电工证(1-2月), 养老护理员(1-3月)]
    key_insight: 不要「归零重启」，要「带着东西过去」——你的20年经验没有白干

  县域返乡劳动者:
    age: 不限
    core_contradiction: 本地有资源+城市有需求+中间缺桥梁
    main_axis: 用本地资源+互联网工具打通城乡
    routes:
      - name: 农产品上行
        desc: 把本地好东西卖向全国（直播+冷链物流）
      - name: 下沉服务
        desc: 把城市已有的服务搬到县城（养老/品质餐饮/电商运营）
      - name: 内容引流+本地交付
        desc: 把县城优势变成内容吸引城市消费者
    key_insight: 最佳组合是「本地交付+全国获客」；别照搬城市模式，找到本地独有的东西
