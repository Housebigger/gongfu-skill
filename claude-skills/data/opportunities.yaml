# 十大新蛋糕+评分
# 蒸馏自 strategy/new_value/ 01 + strategy/perspective/ 01-06

# 新蛋糕三种类型
types:
  新需求: 以前不存在的需求（银发陪伴/低空旅游/宠物殡葬/情绪价值服务）
  新供给: 新的满足方式（AI辅助内容/即时零售/绿色能源后市场）
  新组织: 新的连接方式（跨境直连/农产品直销/社区团购）

# 十大确定性增量赛道
opportunities:
  银发经济:
    type: 新需求
    certainty: 5
    barrier: 低-中
    window: 10-20年
    anti_ai: 5
    fit_for: 护理/服务从业者
    specifics: [上门护理, 陪同就医, 老年餐, 银发文旅, 老年大学, 数字陪伴, 养老机构运营]
    key_insight: 60后退休潮是第一代有钱有闲有消费力的「新老人」——不只是照护，还有活跃需求

  低空经济:
    type: 新供给
    certainty: 4
    barrier: 中-高
    window: 早期
    anti_ai: 3
    fit_for: 航空/机械/运营
    specifics: [无人机驾驶员, 低空旅游运营, 低空基础设施运营, eVTOL维修]

  宠物经济:
    type: 新需求
    certainty: 4
    barrier: 低-中
    window: 成长期
    anti_ai: 5
    fit_for: 爱动物+学技能
    specifics: [宠物美容/寄养, 宠物食品电商, 宠物医疗, 宠物殡葬/摄影]

  即时零售:
    type: 新供给
    certainty: 4
    barrier: 低-中
    window: 成长期
    anti_ai: 3
    fit_for: 实体零售从业者
    specifics: [即时零售运营, 前置仓, 本地生活代运营]

  技能服务化:
    type: 新供给
    certainty: 4
    barrier: 低-中
    window: AI红利期
    anti_ai: 2
    fit_for: 有经验的人
    specifics: [经验变付费内容/咨询, AI辅助个人服务品牌, 垂直知识社群]
    key_insight: AI放大个人能力是长期趋势——你的经验抗AI，但内容生产本身被AI放大也替代

  跨境电商:
    type: 新组织
    certainty: 4
    barrier: 中
    window: 缩窄中
    anti_ai: 3
    fit_for: 懂工厂+懂电商
    specifics: [懂工厂的人做选品, AI辅助跨境内容/客服, 本地化运营]
    key_insight: 世界工厂→世界品牌。AI翻译降语言门槛

  乡村振兴:
    type: 新需求
    certainty: 4
    barrier: 低-中
    window: 蓝海
    anti_ai: 4
    fit_for: 县域/返乡
    specifics: [农产品直销, 县域品牌服务, 乡村体验经济, 县域养老/托育]

  绿色能源后市场:
    type: 新供给
    certainty: 5
    barrier: 中
    window: 长期
    anti_ai: 5
    fit_for: 电气/电力/汽修
    specifics: [光伏/风电运维, 储能安装维护, 新能源汽车维修, 碳资产管理]
    key_insight: 后市场（运维/回收/碳管理）比前市场（制造/装机）更大且被低估

  文化出海:
    type: 新组织
    certainty: 4
    barrier: 低-高
    window: 微短剧热
    anti_ai: 2
    fit_for: 内容创作者
    specifics: [微短剧出海, 网文出海, 文化内容运营]

  智能制造后市场:
    type: 新供给
    certainty: 4
    barrier: 中-高
    window: 长期
    anti_ai: 4
    fit_for: 制造业技术工
    specifics: [工业机器人操作/维护/部署, 工业软件/信创, 数控编程]

# 六大前瞻主题（5-10年）
perspectives:
  AI长波冲击:
    summary: AI不消灭工作但消灭不用AI的人
    winners: [AI工具驾驭者, 物理世界服务者, 深度专业判断者, AI系统建维者, 人际信任型服务]
    losers: [基础信息处理, 客服标准问答, 初级设计编程, 信息中介, 标准化教学]
    underrated: 经验+AI=新时代超级个体
    timeline: 分波次推进，每波3-5年

  人口结构巨变:
    summary: 老龄化创造需求、少子化消灭需求
    winners: [养老照护, 银发消费, 健康管理, 适老化改造, 宠物经济, 单人经济, 自动化]
    losers: [母婴用品, 民办幼儿园, K12培训, 大户型房产, 劳动密集低端制造]
    underrated: 60后退休潮是第一代有钱有闲的「新老人」

  能源转型终局:
    summary: 方向不可逆，后市场比前市场大
    winners: [光伏/风电/水电运维, 储能, 电网升级, 新能源汽车后市场, 绿氢, 碳交易]
    losers: [煤炭, 燃油车, 传统炼化燃料, 低端光伏电池产能]
    underrated: 后市场（运维/维修/回收/碳管理）长尾稳定分散适合普通人

  机器人进生产生活:
    summary: 火种已燃，衍生就业被低估
    tracks:
      工业机器人: 成熟
      服务机器人: 成长期
      人形机器人: 极早期
    underrated: 机器人的衍生就业——用/修/调/训机器人门槛低需求大
    timeline: 工业已成熟/服务5-10年/家庭10-15年

  全球化重构出海:
    summary: 世界工厂→世界品牌；模式出海是蓝海
    winners: [跨境电商, 文化内容出海, 新能源出口, 跨境物流, 面向全球南方服务]
    underrated: 模式出海——中国跑通的电商/直播/外卖经验降维到全球南方

  技能即服务:
    summary: 工作单位从岗位变skill
    winners: [能蒸馏skill的专业者, 懂行业底层逻辑的人, skill编排者, skill平台, 普通消费者]
    losers: [标准流程执行者(人肉API), 信息差中介, 依赖人头费的传统机构]
    underrated: skill最大普惠价值不是让专业者赚更多，是让普通人用得起专业服务
