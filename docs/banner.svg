<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="gongfu-skill 共富参谋">
  <defs>
    <!-- 暖色天空渐变：朝霞 -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="45%" stop-color="#FFCC70"/>
      <stop offset="100%" stop-color="#FFE8B0"/>
    </linearGradient>
    <!-- 梯田金光渐变 -->
    <linearGradient id="terrace1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8A53D"/>
      <stop offset="100%" stop-color="#C8852A"/>
    </linearGradient>
    <linearGradient id="terrace2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4932E"/>
      <stop offset="100%" stop-color="#A86B1F"/>
    </linearGradient>
    <linearGradient id="terrace3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B87A24"/>
      <stop offset="100%" stop-color="#8A5418"/>
    </linearGradient>
    <!-- 太阳光晕 -->
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF4D6" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFD56B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 天空 -->
  <rect width="1200" height="320" fill="url(#sky)"/>

  <!-- 朝阳 -->
  <circle cx="600" cy="120" r="130" fill="url(#sun)"/>
  <circle cx="600" cy="120" r="55" fill="#FFF8E0" opacity="0.95"/>

  <!-- 远山轮廓 -->
  <path d="M0,180 Q150,150 300,165 T600,155 T900,168 T1200,160 L1200,320 L0,320 Z" fill="#9C6B28" opacity="0.35"/>

  <!-- 梯田层叠（由远到近，色调加深）-->
  <!-- 第一层 -->
  <path d="M0,200 Q200,188 400,196 Q600,204 800,190 Q1000,182 1200,196 L1200,232 Q1000,220 800,228 Q600,236 400,228 Q200,222 0,234 Z" fill="url(#terrace1)"/>
  <!-- 第二层 -->
  <path d="M0,240 Q200,226 450,236 Q700,248 950,230 Q1100,222 1200,236 L1200,272 Q1100,260 950,268 Q700,280 450,270 Q200,260 0,274 Z" fill="url(#terrace2)"/>
  <!-- 第三层 -->
  <path d="M0,280 Q250,266 500,276 Q750,288 1000,270 Q1100,264 1200,276 L1200,320 L0,320 Z" fill="url(#terrace3)"/>

  <!-- 梯田水波反光细线 -->
  <g opacity="0.25" stroke="#FFF4D6" stroke-width="1.5" fill="none">
    <path d="M120,210 Q260,206 380,212"/>
    <path d="M520,244 Q660,240 800,246"/>
    <path d="M300,284 Q460,280 620,286"/>
    <path d="M780,288 Q920,284 1080,290"/>
  </g>
</svg>
