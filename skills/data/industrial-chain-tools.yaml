  B-数字与智能产业: [瓶颈定位-找产业链卡点, 卡点四问-我在产业链哪一层, 对抗性验证-先证伪再相信]
  C-绿色能源全链: [瓶颈定位-找产业链卡点, 约束倒推-从硬约束找确定性, 卡点四问-我在产业链哪一层]
  D-农业与乡村振兴: [紫苏叶切入-小而垄断的价值节点, 卡点四问-我在产业链哪一层]
