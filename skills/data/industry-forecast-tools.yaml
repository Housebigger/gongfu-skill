# 逐集群行业前景卡片速查（evergreen 蒸馏）
# 蒸馏自 strategy/economic_policy/09-行业前景推演/<cluster>.md（16 集群）
# 只含「慢变量」：主驱动议题 / 基调 / 卡位方向 / 观察指标名 / 一句话方向 / 详版指引。
# 不含时效数据：三情景阈值、带年份统计、待核实项一律留在知识层 09 文件（见各卡 source）。
# 维护：集群「基调」翻转时同步更新本卡；本卡是知识层的「指针+方向骨架」，不是数据副本。
# 不含个股/证券代码、不给点位时间表、不投资建议、不政治预测。

forecasts:
  A-先进制造与硬科技:
    main_issue: 新动能+外需出海/中美博弈（议题④新质生产力+议题⑤外需管制）
    tone: 分化（高端国产替代顺风，低端代工承压）
    positioning: 增量方向——半导体工艺/设备工程师、工业软件/信创开发、数控机床操作与维护；高技术制造向自主可控方向卡位；低端代工产能承压，宜往精密加工/设备运维方向升级。【AI硬件产业链】扩产最实的卡位是先进封装/封测、AI数据中心液冷基础设施、高速PCB/CCL与高容MLCC高端产线；技能往「高良率+材料配方+客户认证体系」迁移（良率是国产真卡点）；组装端（如光模块）虽全球领跑但走量薄利、可替代性强，宜向上游材料/设备/芯片上攻；警惕「送样/概念」环节画饼，认准「已量产放量」环节
    watch_indicators: 高技术制造业增加值增速、集成电路产量增速、专精特新新增数量、出口多元化政策续签进展；AI硬件链看先进封装产能扩张、HBM/高速光芯片/DSP国产化进展、AI数据中心液冷渗透方向（看方向不看点位）
    one_liner: 内循环新动能+外需多元化双驱，高端国产替代是最确定的长线方向——越往精密/设备/工业软件卡位越有溢价；AI硬件链同理：越往上游材料/封装/芯片、越靠高良率与认证壁垒，越避开走量薄利
    source: strategy/economic_policy/09-行业前景推演/A-先进制造与硬科技.md；AI硬件产业链详版见 strategy/semiconductor_outlook/05-08（技术测绘/投资兑现度/全产业链路线图/景气时序图）

  B-数字与智能产业:
    main_issue: AI与新质生产力（议题④）
    tone: 转（AI替代底层、应用层扩容，基础设施方向顺风）
    positioning: 增量方向——AI应用开发/数据工程师、工业互联网工程师、算法运维；AI工具调用能力是所有岗位的通用门槛升级；纯人工数据录入/客服/基础翻译承压
    watch_indicators: 软件业务收入增速、数字经济核心产业占GDP比重、AI岗位招聘需求趋势（看方向不看点位）
    one_liner: AI是生产工具而非竞争对手——越早掌握AI工具调用能力，越能在数字化浪潮中保住溢价
    source: strategy/economic_policy/09-行业前景推演/B-数字与智能产业.md

  C-绿色能源全链:
    main_issue: 双碳+新动能（议题④新质生产力+双碳长周期）
    tone: 顺风（后市场/运维被低估）
    positioning: 增量方向——储能系统工程师、电站运维、电网技术、碳资产管理；低端组件/电池片产能承压，宜往运维/回收/碳管理后市场卡位。【AI数据中心电力】是 AI 算力的硬约束/使能层、近端确定性最高且最不依赖「AI 继续高增」假设——输变电/变压器/开关/GIS、储能/BBU、800V HVDC 供电链已真实供不应求（交付周期被拉长即放量证据）；卡位输变电制造/特高压与柔直施工运维/储能 PACK 集成/电力电子(HVDC)；SMR/核电新建是 2030+ 远期、非近端棒
    watch_indicators: 风光新增装机、新能源发电量占比、新型储能装机、弃电率；AI 电力看输变电招标增速、变压器交付周期、储能出货、数据中心在建电力占比（看方向不看点位）
    one_liner: 方向不可逆的长周期顺风，后市场比前市场大——往运维/储能/碳管理卡位；AI 算力的电力瓶颈让供电链成为最稳的近端方向，往输变电/储能/电力电子卡位
    source: strategy/economic_policy/09-行业前景推演/C-绿色能源全链.md；AI 硬件近端下一棒(电力)裁决见 strategy/semiconductor_outlook/09

  D-农业与乡村振兴:
    main_issue: 乡村振兴+粮食安全（独立政策主线）
    tone: 顺风（托底型，刚性需求支撑）
    positioning: 增量方向——智慧农机操作、农产品电商运营、农技推广、冷链物流；农业向规模化/机械化/数字化演进，懂技术+懂农业的复合人才有溢价
    watch_indicators: 粮食总产量、高标准农田面积进度、农村居民收入增速（看方向不看点位）
    one_liner: 政策托底+刚性需求，懂农业又懂电商/农机/数字化的复合型人才最稀缺
    source: strategy/economic_policy/09-行业前景推演/D-农业与乡村振兴.md

  E-民生服务:
    main_issue: 人口老龄化+共同富裕（议题⑥人口劳动力+设定E共同富裕）
    tone: 顺风（需求刚性，支付端待打通）
    positioning: 增量方向——养老护理/医养结合技师、托育/育幼指导师、基层医疗/健康管理师；需求不可逆，但政府购买与商业化之间存在支付缺口，建议往有政策资金配套的公办/公建民营岗位卡位
    watch_indicators: 长期护理险覆盖人数、养老床位数、护理员注册数量、养老金购买力趋势（看方向不看点位）
    one_liner: 老龄化驱动的刚性需求，长护险和普惠托育是政策资金最确定的入口——往有政府购买的岗位卡位
    source: strategy/economic_policy/09-行业前景推演/E-民生服务.md

  F-文化创意与出海:
    main_issue: 文化出海（议题⑤）+文化消费（议题①）
    tone: 增（出海方向市场驱动明显，国内受监管约束）
    positioning: 增量方向——游戏/短剧出海运营、本地化翻译（小语种）、IP改编/内容制作；内容出海是当前最活跃的文化产业增量，中文内容的东南亚/中东/拉美本地化人才极度稀缺
    watch_indicators: 自研游戏海外收入增速、版号发放数量、海外微短剧收入趋势、出海APP月活（看方向不看点位）
    one_liner: 文化出海是真实市场机会——懂内容+懂小语种本地化+懂海外运营的复合人才最稀缺
    source: strategy/economic_policy/09-行业前景推演/F-文化创意与出海.md

  G-基建物流房地产:
    main_issue: 财政与地方债+房地产（议题②③）
    tone: 转（三段分化：基建温和支撑/物流结构机会/房地产出清中）
    positioning: 增量方向——城市更新/老旧改造工程师、跨境物流/海外仓运营、物业管理/资产运营；房地产新开发方向收缩，往城市更新/存量运营/跨境物流方向转型；纯传统施工承压
    watch_indicators: 基建投资增速、专项债发行进度、跨境电商出口额增速、存量房交易量（看方向不看点位）
    one_liner: 基建靠专项债托底、物流靠出海增量、房产靠存量运营——分清三段逻辑再做卡位
    source: strategy/economic_policy/09-行业前景推演/G-基建物流房地产.md

  H-新兴未来产业:
    main_issue: 新动能/未来产业培育（议题④新质生产力）
    tone: 增（衍生就业被低估，按技术成熟度分层）
    positioning: 增量方向——工业机器人运维/调试技师、低空无人机飞手/维护、商业航天地面配套；新兴产业高景气但直接岗位总量尚小，衍生制造/运维/测试岗是更可操作的入口。【人形机器人/具身智能】是 AI 应用外延的新需求，但近端确定性最低、最依赖未兑现假设（VLA 泛化/成本年降/灵巧手可靠性），警惕「出货量≠生产力替代量」（含四足/展示机）；真实落点在零部件（减速器/丝杠/电机/传感器精密加工）与「造/训机器人」侧（数据采集/遥操作/调试运维），而非保住旧产线岗——人形本身替代产线工人，宜提前向数据/运维/精密制造迁移
    watch_indicators: 工业机器人产量增速、人形机器人出货量趋势、商业航天发射次数、低空试点扩展城市数量；具身看零部件国产良率与降本、生产力级(非展示机)上岗台数（看方向不看点位）
    one_liner: 未来产业方向确定但成熟度分层——机器人运维和无人机维护是当前最可操作的落地入口；具身智能是应用外延、近端确定性最低，落点在「造/训机器人」侧而非保住旧岗
    source: strategy/economic_policy/09-行业前景推演/H-新兴未来产业.md；AI 硬件近端下一棒(机器人)裁决见 strategy/semiconductor_outlook/09

  I-传统矿业与资源开采:
    main_issue: 能源安全+双碳逆风（独立主线）
    tone: 转（双力并存：能源安全托底+双碳收缩，结构分化）
    positioning: 增量方向——智能矿山设备运维、矿山安全监测技师、战略金属矿（锂/镍/钴/稀土）勘探、矿山生态修复；煤炭是能源安全托底但双碳长期逆风；战略矿产是政策顺风方向；人工采掘岗位持续萎缩
    watch_indicators: 原煤产量增速、矿山智能化采掘工作面覆盖进展、战略矿产勘查区块供给、矿山安全事故频次（看方向不看点位）
    one_liner: 能源安全托底煤炭短期、双碳压制长期——战略矿产和智能矿山运维是最确定的结构机会
    source: strategy/economic_policy/09-行业前景推演/I-传统矿业与资源开采.md

  J-传统轻纺与日用制造:
    main_issue: 内需消费（议题①）+外需出海（议题⑤）
    tone: 转（双向承压，转型在途）
    positioning: 增量方向——跨境电商运营（懂工厂+懂平台）、柔性供应链管理、智能设备操作；纯人工组装/简单代工产能承压；懂供应链+懂电商的复合人才是突破卡点的关键
    watch_indicators: 纺织服装出口额增速、服装鞋帽零售额增速、跨境电商GMV增速、以旧换新政策执行进度（看方向不看点位）
    one_liner: 内卷+外压双重承压，但懂工厂+懂跨境电商的复合型人才在国际电商平台上有真实溢价
    source: strategy/economic_policy/09-行业前景推演/J-传统轻纺与日用制造.md

  K-传统重化工与建材:
    main_issue: 双碳逆风+房地产需求下行（议题②③+双碳）
    tone: 转（逆风为主，绿色转型中有结构性机会）
    positioning: 增量方向——超低排放设施运维岗、电炉炼钢操作工、碳核查员/碳资产管理师；传统高炉/燃煤产能加速退出；往绿色制造/碳资产管理卡位是最可操作的转型路径
    watch_indicators: 粗钢产量增速、新开工面积趋势、碳配额执行进度与碳市场价格方向、超低排放改造覆盖率（看方向不看点位）
    one_liner: 双碳+房地产双重逆风是结构性压力，但超低排放运维和碳资产管理是逆风中的确定性增量
    source: strategy/economic_policy/09-行业前景推演/K-传统重化工与建材.md

  L-商贸零售与餐饮住宿:
    main_issue: 内需/提振消费（议题①）
    tone: 转（分化：服务消费顺风，传统实体承压）
    positioning: 增量方向——即时零售运营、连锁餐饮/品牌管理、特色餐饮/文旅体验；传统实体零售承压，平台化/数字化运营能力是核心竞争力；旅游/体验消费是结构性顺风
    watch_indicators: 社零总额增速、服务零售额增速（对比商品零售）、旅游出游花费增速、餐饮收入增速（看方向不看点位）
    one_liner: 实体承压但服务消费顺风——懂数字化运营和体验设计的复合人才比纯门店岗位更抗压
    source: strategy/economic_policy/09-行业前景推演/L-商贸零售与餐饮住宿.md

  M-金融与商务服务:
    main_issue: 金融监管/防风险/化债（议题③）+共同富裕让利实体（设定E）
    tone: 转（传统规模驱动型岗位承压，五篇大文章方向结构机会）
    positioning: 增量方向——养老金融顾问/产品经理、合规/风控专员、科技金融客户经理、出海财务/法务顾问；银行柜员/传统保险代理/基础券商经纪在净息差收窄+AI替代+监管收紧三重压力下持续承压；五篇大文章（科技/普惠/养老/绿色/数字金融）是结构机会方向
    watch_indicators: 商业银行净息差走势、五篇大文章贷款余额增速、个人养老金实际缴存人数增速、银行不良贷款率走势（看方向不看点位）
    one_liner: 传统金融高薪岗位三重承压，但合规/养老金融/科技金融是净息差压缩中最稳的结构增量
    source: strategy/economic_policy/09-行业前景推演/M-金融与商务服务.md

  N-教育与培训:
    main_issue: 人口少子化（议题⑥）+职教/产教融合+双减遗续
    tone: 转（结构高度分化：基础教育逆风+职业教育顺风）
    positioning: 增量方向——职业教育双师型教师（行业工程师转教师）、职业培训师、成人技能培训、考公考研培训；幼儿园/小学教师需求峰值已过，学科类教培赛道不可逆萎缩；职业教育/技能培训是最确定的结构增量
    watch_indicators: 幼儿园/小学在校生数量同比变化、职业教育在校生规模、职业技能等级认定证书年度发证量、技能人才薪资中位数趋势（看方向不看点位）
    one_liner: 少子化+双减让传统教育岗位不可逆收缩——有行业经验的工程师转双师型教师是最确定的职教机会
    source: strategy/economic_policy/09-行业前景推演/N-教育与培训.md

  O-居民生活服务:
    main_issue: 服务消费（议题①）+银发/宠物等结构趋势
    tone: 增（市场结构驱动，政策为背景顺风）
    positioning: 增量方向——新能源汽车三电维修技师、宠物医疗/美容师、高级造型/科技美容、适老生活服务；完全抗AI替代是O集群真实结构优势；传统婚庆套餐模式因出生人口下降承压；新能源汽修供需错配最严重，有技能者溢价最高
    watch_indicators: 服务零售额同比增速、居民人均服务性消费支出增速、宠物消费市场增速、新能源汽车保有量增速（看方向不看点位）
    one_liner: 完全抗AI替代+结构趋势驱动，新能源汽修技师稀缺溢价和宠物医疗是最确定的两个入口
    source: strategy/economic_policy/09-行业前景推演/O-居民生活服务.md

  P-公用事业与市政服务:
    main_issue: 新型城镇化/财政化债（议题③）+双碳/环保长周期
    tone: 转（两分格局：刚需托底稳定/财政支出段承压）
    positioning: 增量方向——污水处理/水务工程师、地下管网非开挖修复技师、固废资源化运营、智慧水务/燃气安全物联网运维；供水/燃气/环卫刚需稳定；公交补贴依赖地方财政承压；人工道路清扫岗位持续被机械化替代
    watch_indicators: 生态保护和环境治理业投资增速、公共设施管理业投资增速、公交客运量及欠薪事件趋势、专项债发行进度（看方向不看点位）
    one_liner: 刚需托底+双碳慢变量撑住环保方向，公交财政补贴是最真实的逆风线——往水务/环保运维而非公交方向卡位
    source: strategy/economic_policy/09-行业前景推演/P-公用事业与市政服务.md

