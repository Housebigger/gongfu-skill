# 马克思主义思维工具速查
# 蒸馏自 methodology/marxism/reference/ + methodology/marxism/inspiration/
# 与 methodology-tools.yaml（毛泽东思想工具）互补：
#   毛泽东工具侧重"怎么行动"（矛盾分析、持久战、集中兵力）
#   马克思主义工具侧重"看清为什么"（剩余价值、异化、生产资料、经济基础）

tools:
  剩余价值-雇佣劳动与资本:
    principle: 你的工资不是你的价值——工资是"维护费"，你创造的价值减去工资是剩余价值
    use_when: 用户困惑"为什么拼命还是穷"/质疑收入分配/感到付出与回报不成比例
    one_liner: 你的工资不等于你的价值——差价叫剩余价值
    quote_source: 马克思《雇佣劳动与资本》/《工资、价格和利润》/《资本论》第一卷

  异化劳动-1844年手稿:
    principle: 雇佣劳动让劳动者与劳动成果、劳动过程、同事、自我疏离——痛苦是结构性的不是心理的
    use_when: 用户感到"工作让我不是自己"/上班痛苦下班瘫痪/跟同事只有竞争感
    one_liner: 不是你矫情——是系统在碾压你，异化劳动的四重痛苦都有结构性原因
    quote_source: 马克思《1844年经济学哲学手稿》

  经济基础决定上层建筑-政经批判序言:
    principle: 收入决定生活方式和心态——先稳经济基础，再谈精神追求
    use_when: 用户在"心态不好"和"钱不够"之间纠结/用调整心态替代改变收入结构
    one_liner: 先活下来再谈理想——经济基础不够时一切焦虑都有经济根源
    quote_source: 马克思《政治经济学批判序言》

  生产资料-哥达纲领批判:
    principle: 劳动不是一切财富的源泉——你只有劳动能力不够，还需要生产资料（工具/客户/品牌/渠道）
    use_when: 用户困惑"拼命但赚不到"/收入来源单一/完全依赖工资
    one_liner: 光有劳动没有生产资料，你永远只是半个生产力
    quote_source: 马克思《哥达纲领批判》

  实践观-费尔巴哈提纲:
    principle: 真正的理解不是脑子里想通，是手上做出来——做不到就是没懂
    use_when: 用户"道理都懂但做不到"/过度准备不行动/收藏学习不实践
    one_liner: 知道但做不到等于不知道——问题不在于解释世界，在于改变世界
    quote_source: 马克思《关于费尔巴哈的提纲》第11条

  联合-共产党宣言:
    principle: 原子化的劳动者永远处于弱势——联合能改变力量对比
    use_when: 用户孤立无援/一个人的力量撑不住/需要合作但不知道怎么找
    one_liner: 一个人扛不过去的事一群人扛——联合不是口号是博弈策略
    quote_source: 马克思、恩格斯《共产党宣言》

  时间是人类发展的空间-工资价格和利润:
    principle: 被工作占满全部时间的人没有发展空间——下班瘫痪是系统性消耗的结果
    use_when: 用户下班后什么都不想干/感到没有时间成长/陷入工作-恢复-工作的循环
    one_liner: 时间是人类发展的空间——被资本占满时间的人不如载重的牲畜
    quote_source: 马克思《工资、价格和利润》

  必然王国到自由王国-空想到科学:
    principle: 自由不是不工作，是可以选择做什么样的工作——从"不得不"到"可以选择"
    use_when: 用户渴望"不用打工"/感到没有选择权/想追求财务自由
    one_liner: 自由不是不工作，是你可以选择怎么工作——每减少一个"不得不"你就自由一点
    quote_source: 恩格斯《社会主义从空想到科学的发展》

  一切固定的东西都消散了-共产党宣言:
    principle: 资本主义不停消解稳定的东西——你的焦虑是世界在碎裂的投影
    use_when: 用户焦虑于变化太快/怀念过去的稳定/恐惧不确定性
    one_liner: 不是你矫情——一切固定的东西真的在碎，用冷静的眼光看你的位置
    quote_source: 马克思、恩格斯《共产党宣言》

  辩证法-自然辩证法:
    principle: 量变到质变/对立统一/否定之否定——世界是动态的不是静止的
    use_when: 技术选型/系统架构/判断行业演化方向/面对矛盾决策
    one_liner: 不要用静态眼光看动态系统——矛盾不能消灭只能平衡
    quote_source: 恩格斯《自然辩证法导言》/《反杜林论》

# 马克思主义与行业集群的匹配规则
# 当引擎路由到特定集群时，自动匹配最相关的马克思主义工具
cluster_match:
  A-先进制造与硬科技:
    - 剩余价值-雇佣劳动与资本
    - 生产资料-哥达纲领批判
  B-数字与智能产业:
    - 辩证法-自然辩证法
    - 实践观-费尔巴哈提纲
  C-绿色能源全链:
    - 生产资料-哥达纲领批判
    - 经济基础决定上层建筑-政经批判序言
  D-农业与乡村振兴:
    - 生产资料-哥达纲领批判
    - 联合-共产党宣言
  E-民生服务:
    - 时间是人类发展的空间-工资价格和利润
    - 异化劳动-1844年手稿
  F-文化创意与出海:
    - 实践观-费尔巴哈提纲
    - 一切固定的东西都消散了-共产党宣言
  G-基建物流房地产:
    - 异化劳动-1844年手稿
    - 时间是人类发展的空间-工资价格和利润
  H-新兴未来产业:
    - 一切固定的东西都消散了-共产党宣言
    - 生产资料-哥达纲领批判
  I-传统矿业与资源开采:
    - 剩余价值-雇佣劳动与资本
    - 经济基础决定上层建筑-政经批判序言
  J-传统轻纺与日用制造:
    - 剩余价值-雇佣劳动与资本
    - 生产资料-哥达纲领批判
  K-传统重化工与建材:
    - 经济基础决定上层建筑-政经批判序言
    - 一切固定的东西都消散了-共产党宣言
  L-商贸零售与餐饮住宿:
    - 生产资料-哥达纲领批判
    - 联合-共产党宣言
  M-金融与商务服务:
    - 辩证法-自然辩证法
    - 剩余价值-雇佣劳动与资本
  N-教育与培训:
    - 实践观-费尔巴哈提纲
    - 必然王国到自由王国-空想到科学
  O-居民生活服务:
    - 时间是人类发展的空间-工资价格和利润
    - 联合-共产党宣言
  P-公用事业与市政服务:
    - 一切固定的东西都消散了-共产党宣言
    - 必然王国到自由王国-空想到科学
