# 方法论工具速查
# 蒸馏自 strategy/worker_guidance/README.md 第四节 + 各层方法论根基
# 权威编号来源：methodology/mao_zedong_thought/inspiration/inspiration_on_today_life/indexes/000-mao-anthology-sequential-reading-overview.md

tools:
  矛盾论-018:
    principle: 抓主要矛盾、分清主次
    use_when: 需要识别核心变量——是产能？技术？政策？需求？
    one_liner: 先分清主要矛盾——是行业问题还是你的问题？
    quote_source: methodology（018《矛盾论》/017《实践论》是姊妹篇，矛盾论=018）

  论持久战-027:
    principle: 相持蓄力、反对速胜论
    use_when: 长周期行业（能源转型/芯片攻关/创业初期）需要持久战思维
    one_liner: 硬仗是持久战，别被速胜论带偏，也别被必败论吓退
    quote_source: methodology（027《论持久战》；026是《抗日游击战争的战略问题》）

  丢掉幻想准备斗争-155:
    principle: 丢掉外部依赖、做最坏打算
    use_when: 判断自主可控/依赖外部技术/要不要all in/创业时机
    one_liner: 丢掉「永远可靠」的幻想，给自己准备后路
    quote_source: methodology（155《丢掉幻想，准备斗争》）

  一切反动派都是纸老虎-229:
    principle: 战略上藐视、战术上重视
    use_when: 对行业下行/外部威胁/困难判断
    one_liner: 战略上不信「完蛋了」，战术上认真准备
    quote_source: methodology（229《一切反动派都是纸老虎》）

  关心群众生活注意工作方法-011:
    principle: 解决群众急难愁盼
    use_when: 判断需求真不真实——人总要吃饭/看病/养老
    one_liner: 看真实需求在哪——解决人的急难愁盼
    quote_source: methodology（011《关心群众生活，注意工作方法》）

  关于正确处理人民内部矛盾的问题-217:
    principle: 辩证处理社会张力
    use_when: 处理内部矛盾（合伙/家庭/团队分歧）
    one_liner: 用发展而非对抗解决矛盾——团结-批评-团结
    quote_source: methodology（217《关于正确处理人民内部矛盾的问题》）

  星星之火可以燎原-006:
    principle: 培育火种、不被现状束缚
    use_when: 未来产业/创业起步/判断新趋势能不能燎原
    one_liner: 看火种保不保得住、方向对不对
    quote_source: methodology（006《星星之火，可以燎原》；007是《反对本本主义》）

  集中优势兵力各个歼灭敌人-103:
    principle: 聚焦优势、不分散
    use_when: 技能投资/创业方向/多选择纠结
    one_liner: 聚焦1-2个，不撒胡椒面
    quote_source: methodology（103《集中优势兵力，各个歼灭敌人》）

  改造我们的学习-060:
    principle: 反对教条、实事求是
    use_when: 技能转型/选方向/学习规划
    one_liner: 面向真实市场需求，不迷信学历/证书
    quote_source: methodology（060《改造我们的学习》）

  必须注意经济工作-008:
    principle: 经济基础决定一切
    use_when: 判断制造业/实体岗位的长期价值
    one_liner: 制造业是根，实体岗位长期价值高于虚拟经济
    quote_source: methodology（008《必须注意经济工作》）

  团结起来划清敌我界限-181:
    principle: 团结大多数、分清内外
    use_when: 找合作伙伴/协作/对外开放
    one_liner: 团结能团结的人，先划清能一起干和不能一起干的人
    quote_source: methodology（181《团结起来，划清敌我界限》）

# 阶段判断速查（problem-diagnosis 用）
stage_judgment:
  速决战阶段:
    signs: 机会窗口很短，必须快速行动
    strategy: 果断出手，不犹豫
  相持阶段:
    signs: 最难熬，看不到进展但不能退
    strategy: 蓄力等待，不冒进不放弃。保存有生力量第一。
  反攻阶段:
    signs: 形势开始好转，该乘势而上
    strategy: 集中力量，扩大战果

# 路由意图关键词（situation-triage 用）
intent_keywords:
  困境迷茫: [累, 纠结, 不知道, 迷茫, 该怎么办, 怕, 崩, 焦虑, 压力, 不想干了]
  行业判断: [前景, 行不行, 方向, 好不好, 还有戏吗, 走下坡, 夕阳]
  创业意向: [创业, 副业, 自己做, 开店, 开个, 搞个, 兼职赚, 个体户, 开机构, 开一家]
  成长需求: [学什么, 考证, 转行, 提升, 规划, 怎么学, 进修]
  协作需求: [合伙, 合作, 找人, 团队, 一起干, 组队]
  趋势前瞻: [未来, 趋势, 几年后, 会不会被替代, 前景, AI会不会]

# 情绪危机信号（situation-triage 特殊处理用）
crisis_signals:
  耗竭: [太累了, 心累, 真的累, 很累, 熬不住, 心态崩, 崩溃, 身心俱疲]
  # 子串匹配：词条均为低误判的明确自杀信号短语；不收 想死/没意思/想不开 等（与 想死你了/这工作没意思/一时想不开 等口语冲突）
  危机: [不想活了, 不想活, 活着没意思, 活着真没意思, 了结自己, 了结生命, 结束生命, 死了算了, 不如死, 生无可恋, 轻生]
  handling:
    耗竭: 先处理情绪——建议休息恢复，不急于给职业判断。用相持阶段框架。
    危机: 不路由到任何职业skill。建议寻求专业帮助/拨打心理援助热线。
