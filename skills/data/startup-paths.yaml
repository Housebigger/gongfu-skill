# 创业路径+劝退条件
# 蒸馏自 strategy/entrepreneurship/ 00-07

# 零成本的定义
zero_cost_definition: 不负债、不融资、不囤货、不租铺。用「技能+时间+AI工具」替代「资本」，用「先验证再投入」替代「先投入再赌」。

# 四条路径
paths:
  服务化:
    core: 把已有手艺直接卖给客户
    fit_for: 有手艺的技术工人/服务业从业者（电工/美容/厨师/设计/护理）
    speed: 最快（第一周可能接单）
    ceiling: 受限于个人时间
    first_step: 在朋友圈/社区群发一条服务信息
    key_insight: 越是需要人到场的活，越值钱，越抗AI

  内容化:
    core: 把经验变成内容，用内容获客建信用再变现
    fit_for: 有3年+经验和表达意愿的人
    speed: 最慢（1-3个月）
    ceiling: 最高（规模效应）
    first_step: 选一个平台，找到你的内容定位，发第一条
    key_insight: 你的经验对内行是常识，对外行是千金

  电商化:
    core: 卖产品但不囤货——一件代发/精选联盟/预售
    fit_for: 有选品眼光和运营能力的人
    speed: 中等（2-4周）
    ceiling: 高（可规模化）
    first_step: 选一个你懂的品类，在1688找代发货源
    key_insight: 核心不是卖什么，是你比买家多懂什么

  技能出租:
    core: 把闲置设备/资质/场地/时间租出去
    fit_for: 有可出租资源的人
    speed: 快（1-2周）
    ceiling: 受限于资源量
    first_step: 盘点你有但没在赚钱的东西
    key_insight: 证件跟人走不跟钱走，挂证是红线

# 劝退检查（命中任何一条❌则暂不建议创业）
abort_checks:
  - id: 1
    condition: 家庭财务紧张到下个月房贷还不上
    verdict: ❌暂不建议
    advice: 先稳定主业，恢复到有3-6个月结余
  - id: 2
    condition: 家人强烈反对且无法沟通
    verdict: ❌暂不建议
    advice: 先沟通，硬做是赌气不是创业
  - id: 3
    condition: 创业原因是「不想打工了/讨厌现在的老板」
    verdict: ⚠️重新想想
    advice: 「逃离」不是「向往」，先想清楚走向什么
  - id: 4
    condition: 没有任何可以变现的技能或经验
    verdict: ❌先学技能
    advice: 技能是创业的前提，去growth_path学一门技能
  - id: 5
    condition: 信「三个月月入十万」
    verdict: ❌你是别人的项目
    advice: 远离割韭菜，建立现实预期
  - id: 6
    condition: 只想当老板不想干活
    verdict: ❌认清现实
    advice: 个体户比打工更累
  - id: 7
    condition: 所在行业增量窗口已关闭
    verdict: ⚠️换赛道
    advice: 在收缩赛道创业成功率极低

# 适合信号（命中≥3条则条件基本具备）
fit_signals:
  - 手里有一门能直接帮别人解决问题的技能
  - 主业稳定，有业余时间
  - 有3-6个月生活费结余
  - 家人至少不强烈反对
  - 看到了真实的反复出现的别人愿意付钱的需求

# 三阶段标记
stages:
  试-验证期:
    months: 1-3
    status: 还在上班，用业余时间
    goal: 卖出第一单
    budget: ≤500元
    rule: 不辞职、不借钱
  稳-起步期:
    months: 4-12
    status: 仍在上班，副业有稳定小额收入
    goal: 系统化、扩大客源
    rule: 仍不辞职，直到副业超主业3个月
  扩-发展期:
    trigger: 副业收入稳定超过主业3个月
    status: 可考虑全职投入
    goal: 团队化/品牌化
    note: 不是所有人都要到这个阶段。幸福比规模重要。

# 七条合规红线
red_lines:
  - 不挂证（执业证只跟服务走，挂证违法）
  - 不无证经营（需资质的行业先考证）
  - 不虚假宣传（尤其食品/保健品/化妆品）
  - 不传销（收入靠卖货不靠拉人头，最多2级分销）
  - 不刷单（假数据不带来真客户）
  - 不侵权（用自己内容、拍自己图、取不侵权名字）
  - 不碰金融揽储（零成本创业是赚客户的钱，不是拿别人的钱投资）
