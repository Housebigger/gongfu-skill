# 习近平新时代中国特色社会主义思想思维工具速查
# 蒸馏自 methodology/xi_jinping_thought/reference/ + inspiration/
# 四体系中的"方向层"：马克思看懂 → 毛泽东打仗 → 邓小平实干 → 习近平指方向

tools:
  新质生产力:
    principle: 未来靠创新不靠投入——你的技能是"新质"（不可替代）还是"旧质"（可被标准化/自动化）
    use_when: 用户在判断技能投资方向/困惑于"学什么才不会被替代"
    one_liner: 你的技能是"新质"还是"旧质"——这决定了你未来是涨薪还是被淘汰
    quote_source: 习近平2023年论述

  以人民为中心:
    principle: 判断一个方向值不值得，最终标准是"它在不在服务人民的真实需求"
    use_when: 用户在选行业/选方向/判断某个生意值不值得做
    one_liner: 真实需求在群众那里——服务人民的急难愁盼永远不会过时
    quote_source: 习近平2012年起多次论述

  高质量发展:
    principle: 不再拼规模拼体力——从"多干活就能赚钱"转向"干得好才赚钱"
    use_when: 用户在拼加班/拼时长/困在"更努力但没效果"的循环里
    one_liner: 高质量发展=不拼体力拼价值，不是加班更多而是产出更值钱
    quote_source: 习近平2017年党的十九大报告

  共同富裕:
    principle: 不是等富——是勤劳创新致富，先富带后富，你是先富的那个人
    use_when: 用户感到"普通人没有机会"/困在"大家都不好"的环境中
    one_liner: 共同富裕不是等来的——国家创造条件，你去抓住
    quote_source: 习近平2021年中央财经委第十次会议

  绿水青山就是金山银山:
    principle: 绿色经济是国家战略级别的确定性赛道——双碳目标=35年超级长周期
    use_when: 用户在判断绿色能源/环保/碳管理方向的长期价值
    one_liner: 绿水青山就是金山银山——绿色经济不是可选方向是必选方向
    quote_source: 习近平2005年起多次论述

  三种精神:
    principle: 劳动精神（踏实干活）+工匠精神（精益求精）+劳模精神（创新引领）=劳动者的尊严和出路
    use_when: 用户感到"干这行没面子"/低估自己工作的价值
    one_liner: 你的手艺不只是谋生手段——精益求精本身就是价值
    quote_source: 习近平2020年全国劳模表彰大会

  全面深化改革:
    principle: 变化没有终点——你的策略应该是"适应变化"而不是"等变化结束"
    use_when: 用户在等"稳定了再说"/困在"等政策/等行情"的心态里
    one_liner: 改革只有进行时没有完成时——变化是常态，唯一稳的是适应变化的能力
    quote_source: 习近平2013年起多次论述

# 集群匹配规则
